<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ash - Portfolio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000000;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', system-ui, sans-serif;
      overflow: hidden;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: gridScroll 20s linear infinite;
      opacity: 0.5;
    }

    @keyframes gridScroll {
      0% { transform: translate(0, 0); }
      100% { transform: translate(50px, 50px); }
    }

    /* Gradient overlay */
    body::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 50%, rgba(100, 100, 255, 0.03) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Main container */
    .container {
      position: relative;
      z-index: 10;
      text-align: center;
      max-width: 500px;
      padding: 0 20px;
    }

    /* Logo/Icon */
    .logo {
      width: 64px;
      height: 64px;
      margin: 0 auto 32px;
      background: linear-gradient(135deg, #ffffff 0%, #888888 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 700;
      color: #000;
      animation: fadeInScale 0.6s ease-out;
      box-shadow: 0 8px 32px rgba(255, 255, 255, 0.1);
    }

    @keyframes fadeInScale {
      0% {
        opacity: 0;
        transform: scale(0.8);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* Main heading */
    .heading {
      font-size: 32px;
      font-weight: 600;
      margin-bottom: 16px;
      letter-spacing: -0.5px;
      animation: fadeInUp 0.8s ease-out 0.2s both;
    }

    /* Subheading */
    .subheading {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 48px;
      font-weight: 400;
      animation: fadeInUp 0.8s ease-out 0.3s both;
    }

    @keyframes fadeInUp {
      0% {
        opacity: 0;
        transform: translateY(20px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Progress bar container */
    .progress-wrapper {
      animation: fadeInUp 0.8s ease-out 0.4s both;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 12px;
      font-weight: 500;
    }

    .progress-container {
      width: 100%;
      height: 2px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #ffffff 0%, rgba(255, 255, 255, 0.6) 100%);
      border-radius: 2px;
      width: 0%;
      animation: progressFill 6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
    }

    @keyframes progressFill {
      0% { width: 0%; }
      100% { width: 100%; }
    }

    /* Loading dots */
    .loading-dots {
      margin-top: 32px;
      display: flex;
      justify-content: center;
      gap: 8px;
      animation: fadeInUp 0.8s ease-out 0.5s both;
    }

    .dot {
      width: 6px;
      height: 6px;
      background: rgba(255, 255, 255, 0.4);
      border-radius: 50%;
      animation: dotPulse 1.4s ease-in-out infinite;
    }

    .dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes dotPulse {
      0%, 100% {
        opacity: 0.4;
        transform: scale(1);
      }
      50% {
        opacity: 1;
        transform: scale(1.2);
      }
    }

    /* Status text */
    .status {
      margin-top: 24px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.3);
      font-weight: 400;
      min-height: 20px;
      transition: opacity 0.3s ease;
      animation: fadeInUp 0.8s ease-out 0.6s both;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .heading {
        font-size: 28px;
      }
      .subheading {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">A</div>
    <h1 class="heading">Loading Portfolio</h1>
    <p class="subheading">Preparing your experience</p>
    
    <div class="progress-wrapper">
      <div class="progress-label">
        <span id="statusText">Initializing</span>
        <span id="percentage">0%</span>
      </div>
      <div class="progress-container">
        <div class="progress-bar"></div>
      </div>
    </div>

    <div class="loading-dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <div class="status" id="status"></div>
  </div>

  <script>
    // Loading stages
    const stages = [
      { time: 0, text: 'Initializing' },
      { time: 1500, text: 'Loading assets' },
      { time: 3000, text: 'Building interface' },
      { time: 4500, text: 'Finalizing' },
      { time: 5500, text: 'Ready' }
    ];

    const statusText = document.getElementById('statusText');
    const percentage = document.getElementById('percentage');

    // Update status text
    stages.forEach(stage => {
      setTimeout(() => {
        statusText.style.opacity = '0';
        setTimeout(() => {
          statusText.textContent = stage.text;
          statusText.style.opacity = '1';
        }, 150);
      }, stage.time);
    });

    // Smooth percentage counter
    let currentPercent = 0;
    const percentInterval = setInterval(() => {
      if (currentPercent < 100) {
        currentPercent += 1;
        percentage.textContent = currentPercent + '%';
      } else {
        clearInterval(percentInterval);
      }
    }, 60);

    // Redirect after 6 seconds with fade
    setTimeout(() => {
      document.body.style.transition = 'opacity 0.4s ease';
      document.body.style.opacity = '0';
      setTimeout(() => {
        window.location.href = "https://ash-kernel.vercel.app";
      }, 400);
    }, 6000);
  </script>
</body>
</html>
