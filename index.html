<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Redirecting...</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
      background-size: 400% 400%;
      animation: gradientShift 8s ease infinite;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Inter', sans-serif;
      overflow: hidden;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    /* Floating particles */
    .particles {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 1;
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(100, 200, 255, 0.5);
      border-radius: 50%;
      animation: float 15s infinite ease-in-out;
    }

    @keyframes float {
      0%, 100% { 
        transform: translateY(0) translateX(0) scale(1);
        opacity: 0;
      }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% {
        transform: translateY(-100vh) translateX(50px) scale(0.5);
        opacity: 0;
      }
    }

    /* Main container */
    .container {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 60px 40px;
      background: rgba(20, 20, 30, 0.4);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      min-width: 400px;
      max-width: 500px;
    }

    /* Logo/Icon */
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 30px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      animation: pulse 2s ease-in-out infinite;
      box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    /* Loading text */
    .loading-text {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
      background: linear-gradient(90deg, #fff, #667eea, #fff);
      background-size: 200% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s linear infinite;
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    /* Status text */
    .status-text {
      font-size: 15px;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 30px;
      min-height: 22px;
      transition: all 0.4s ease;
      font-weight: 400;
      letter-spacing: 0.5px;
    }

    /* Progress bar container */
    .progress-container {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 20px;
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
      background-size: 200% 100%;
      border-radius: 10px;
      width: 0%;
      animation: progressFill 6s ease-in-out forwards, progressShimmer 2s linear infinite;
      box-shadow: 0 2px 10px rgba(102, 126, 234, 0.6);
    }

    @keyframes progressFill {
      0% { width: 0%; }
      100% { width: 100%; }
    }

    @keyframes progressShimmer {
      0% { background-position: 0% 0; }
      100% { background-position: 200% 0; }
    }

    /* Percentage */
    .percentage {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.5);
      font-weight: 600;
      margin-top: 12px;
      letter-spacing: 1px;
    }

    /* Spinner (subtle accent) */
    .spinner {
      width: 40px;
      height: 40px;
      margin: 20px auto 0;
      border: 3px solid rgba(102, 126, 234, 0.2);
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 500px) {
      .container {
        min-width: 90%;
        padding: 40px 30px;
      }
      .loading-text {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <!-- Animated particles -->
  <div class="particles" id="particles"></div>

  <!-- Main container -->
  <div class="container">
    <div class="icon">✨</div>
    <div class="loading-text">Loading Portfolio</div>
    <div class="status-text" id="statusText">Preparing experience...</div>
    
    <div class="progress-container">
      <div class="progress-bar"></div>
    </div>
    
    <div class="percentage" id="percentage">0%</div>
    <div class="spinner"></div>
  </div>

  <script>
    // Create floating particles
    const particlesContainer = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.animationDelay = Math.random() * 15 + 's';
      particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
      particlesContainer.appendChild(particle);
    }

    // Loading stages (spread across 6 seconds)
    const stages = [
      { time: 0, text: 'Preparing experience...', percent: 0 },
      { time: 1500, text: 'Loading components...', percent: 25 },
      { time: 3000, text: 'Initializing content...', percent: 50 },
      { time: 4500, text: 'Almost ready...', percent: 75 },
      { time: 5500, text: 'Launching portfolio...', percent: 95 }
    ];

    const statusText = document.getElementById('statusText');
    const percentage = document.getElementById('percentage');

    // Animate through stages
    stages.forEach(stage => {
      setTimeout(() => {
        statusText.style.opacity = '0';
        setTimeout(() => {
          statusText.textContent = stage.text;
          statusText.style.opacity = '1';
        }, 200);
      }, stage.time);
    });

    // Smooth percentage counter (reaches 100% in 6 seconds)
    let currentPercent = 0;
    const percentInterval = setInterval(() => {
      if (currentPercent < 100) {
        currentPercent += 1;
        percentage.textContent = currentPercent + '%';
      } else {
        clearInterval(percentInterval);
      }
    }, 60); // 6000ms / 100 = 60ms per step

    // Redirect after 6 seconds
    setTimeout(() => {
      document.body.style.opacity = '0';
      document.body.style.transition = 'opacity 0.3s ease';
      setTimeout(() => {
        window.location.href = "https://ash-kernel.vercel.app";
      }, 300);
    }, 6000);
  </script>
</body>
</html>
