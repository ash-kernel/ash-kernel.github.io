<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ash | Portfolio</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui;
      background: #0f1115;
      color: white;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 40px 20px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.7;
    }

    .projects {
      margin-top: 40px;
    }

    .card {
      background: #1a1d24;
      padding: 20px;
      margin: 15px 0;
      border-radius: 12px;
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    a {
      color: #38bdf8;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Ash</h1>
    <p>Developer • Building cool stuff</p>

    <div class="projects">
      <h2>Projects</h2>

      <div class="card">
        <h3>SpiceDeck</h3>
        <p>Unified game launcher</p>
        <a href="https://github.com/ash-kernel/spicedeck">View Project</a>
      </div>

      <div class="card">
        <h3>Zetonic</h3>
        <p>Custom Chromium new tab</p>
        <a href="https://github.com/ash-kernel/zetonic">View Project</a>
      </div>

    </div>
  </div>

</body>
</html>
